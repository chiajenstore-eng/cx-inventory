<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>埕心 SELECT | 旗艦管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fcfaf7; }
        .product-card { background: #fff; border-radius: 20px; border: 1px solid #f1f1f1; }
        .active-tab { color: #bfa07a !important; border-bottom: 3px solid #bfa07a; }
        .submit-btn { background: linear-gradient(135deg, #bfa07a 0%, #a68a64 100%); box-shadow: 0 10px 20px rgba(191, 160, 122, 0.3); }
        .stepper-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: #fff; color: #bfa07a; border: 1px solid #eee; border-radius: 10px; }
    </style>
</head>
<body class="pb-32">
    <header class="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-gray-100 px-6 py-5 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black text-slate-800 italic tracking-tighter uppercase">CHENG XIN</h1>
            <p id="current-mode-title" class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1 text-center bg-slate-100 rounded-full px-2">收攤點貨</p>
        </div>
        <div id="header-stat" class="text-right">
            <span id="stat-value" class="text-xl font-black text-red-500">$0</span>
            <span id="stat-label" class="block text-[9px] text-slate-400 font-bold uppercase tracking-widest">庫存價值</span>
        </div>
    </header>

    <div id="app" class="p-4">
        </div>

    <div id="action-bar" class="fixed bottom-24 left-0 right-0 px-6 z-40">
        <button onclick="handleMainAction()" class="submit-btn w-full py-4 rounded-2xl text-white font-bold text-lg flex items-center justify-center gap-3 active:scale-95 transition-transform">
            <i class="fas fa-check-circle"></i> 確認送出
        </button>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex h-20 items-center justify-around shadow-2xl z-50 text-slate-300">
        <div onclick="switchMode('inventory')" id="nav-inventory" class="flex flex-col items-center font-bold transition-all active-tab">
            <i class="fas fa-calculator text-lg mb-1"></i><span class="text-[10px]">收攤點貨</span>
        </div>
        <div onclick="switchMode('revenue')" id="nav-revenue" class="flex flex-col items-center font-bold transition-all">
            <i class="fas fa-hand-holding-usd text-lg mb-1"></i><span class="text-[10px]">當日營收</span>
        </div>
        <div onclick="switchMode('orders')" id="nav-orders" class="flex flex-col items-center font-bold transition-all">
            <i class="fas fa-list-alt text-lg mb-1"></i><span class="text-[10px]">訂單管理</span>
        </div>
        <div onclick="switchMode('factory')" id="nav-factory" class="flex flex-col items-center font-bold transition-all">
            <i class="fas fa-truck text-lg mb-1"></i><span class="text-[10px]">工廠叫貨</span>
        </div>
    </nav>

    <script>
        // 你的 62 項產品清單 (簡化版示意，保持原本邏輯)
        const products = [
            { cat: "🥖 麵包區", name: "黃金牛角", price: 35, unit: "個" },
            { cat: "🥖 麵包區", name: "原味小菠蘿", price: 35, unit: "2入" },
            // ... 其餘品項保持不變
        ];

        let state = {
            currentMode: 'inventory',
            data: { inventory: {}, revenue: 0, orders: [], factory: {} }
        };

        function switchMode(mode) {
            state.currentMode = mode;
            // 更新 UI 狀態
            const tabs = ['inventory', 'revenue', 'orders', 'factory'];
            tabs.forEach(t => {
                document.getElementById('nav-' + t).classList.toggle('active-tab', t === mode);
            });

            // 更新 Header 文字
            const modeNames = {
                inventory: '收攤點貨',
                revenue: '當日營收',
                orders: '訂單管理',
                factory: '工廠叫貨'
            };
            document.getElementById('current-mode-title').innerText = modeNames[mode];
            
            render();
        }

        function render() {
            const container = document.getElementById('app');
            const statValue = document.getElementById('stat-value');
            const statLabel = document.getElementById('stat-label');
            container.innerHTML = '';

            if (state.currentMode === 'inventory' || state.currentMode === 'factory') {
                // 顯示品項清單 (點貨與叫貨邏輯)
                renderProductList(container);
                statLabel.innerText = state.currentMode === 'inventory' ? '庫存價值' : '叫貨總數';
            } else if (state.currentMode === 'revenue') {
                container.innerHTML = `
                    <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 text-center">
                        <p class="text-slate-400 font-bold mb-4">輸入今日結帳金額</p>
                        <input type="number" placeholder="0" class="text-4xl font-black text-center w-full outline-none text-[#bfa07a]">
                        <div class="grid grid-cols-2 gap-3 mt-8">
                            <div class="bg-gray-50 p-4 rounded-2xl"><p class="text-xs text-slate-400">現金收入</p><p class="font-bold">$0</p></div>
                            <div class="bg-gray-50 p-4 rounded-2xl"><p class="text-xs text-slate-400">LinePay</p><p class="font-bold">$0</p></div>
                        </div>
                    </div>`;
                statLabel.innerText = '今日總營收';
            } else if (state.currentMode === 'orders') {
                container.innerHTML = `
                    <div class="text-center py-20">
                        <i class="fas fa-clipboard-list text-4xl text-slate-200 mb-4"></i>
                        <p class="text-slate-400 font-bold">目前尚無預訂訂單</p>
                        <button class="mt-4 text-[#bfa07a] font-bold text-sm">+ 新增客戶預訂</button>
                    </div>`;
                statLabel.innerText = '待處理訂單';
            }
        }

        function renderProductList(container) {
            // 原有的產品渲染邏輯...
            container.innerHTML = `<p class="text-center text-slate-400 py-10">【${document.getElementById('current-mode-title').innerText}】功能開發中...</p>`;
        }

        function handleMainAction() {
            alert('準備儲存 ' + document.getElementById('current-mode-title').innerText + ' 數據');
        }

        // 初始化
        switchMode('inventory');
    </script>
</body>
</html>
