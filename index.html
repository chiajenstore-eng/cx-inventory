<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>【 埕心 Select 】旗艦管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fcfaf7; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .product-card { background: #fff; border-radius: 20px; border: 1px solid #f1f1f1; transition: all 0.2s; }
        .active-tab { color: #bfa07a !important; border-bottom: 3px solid #bfa07a; }
        .submit-btn { background: linear-gradient(135deg, #bfa07a 0%, #a68a64 100%); box-shadow: 0 10px 20px rgba(191, 160, 122, 0.3); }
        .stepper-btn { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; background: #fff; color: #bfa07a; border: 1px solid #eee; border-radius: 10px; }
        select { -webkit-appearance: none; appearance: none; background: #f9f9f9; border: none; padding: 10px; border-radius: 15px; font-weight: bold; color: #333; width: 100%; text-align: center; text-align-last: center; border: 1px solid #eee; outline: none; }
        .loading-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center; color:white; font-weight:bold; flex-direction: column; gap: 15px; }
        .order-swipe-container { position: relative; overflow: hidden; border-radius: 30px; user-select: none; margin-bottom: 12px; }
        .order-item-content { position: relative; z-index: 2; transition: transform 0.2s ease-out; background: white; }
        .swipe-bg { position: absolute; inset: 0; background: #06C755; display: flex; align-items: center; padding-left: 25px; color: white; font-weight: 900; font-size: 14px; z-index: 1; border-radius: 30px; opacity: 0; }
    </style>
</head>
<body class="pb-36">
    <div id="loading" class="loading-overlay"><div class="animate-spin text-4xl"><i class="fas fa-sync-alt"></i></div><span id="loading-msg">同步中...</span></div>

    <header class="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-gray-100 px-6 py-5 flex justify-between items-center shadow-sm">
        <div>
            <div class="flex items-center gap-2">
                <h1 class="text-2xl font-black text-slate-800 italic uppercase tracking-tighter">【 埕心 Select 】</h1>
                <span id="session-tag" class="text-[9px] bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-bold hidden">營運中</span>
            </div>
            <p id="current-mode-title" class="text-[10px] text-slate-400 font-bold mt-1 tracking-widest uppercase">旗艦管理系統</p>
        </div>
        <div class="text-right flex flex-col items-end">
            <span id="stat-value" class="text-xl font-black text-red-500">$0</span>
            <div class="flex gap-2 mt-1">
                <button onclick="syncAllCloudData()" class="text-[10px] bg-amber-500 text-white px-2 py-1 rounded-lg font-bold shadow-sm active:bg-amber-600 transition-all"><i class="fas fa-sync-alt mr-1"></i>同步雲端</button>
                <button id="mini-reset-btn" onclick="confirmReset()" class="hidden text-[10px] bg-slate-100 text-slate-400 px-2 py-1 rounded-lg font-bold border border-slate-200">清空本頁</button>
            </div>
            <div id="factory-config-btn" class="hidden mt-2"><button onclick="openBaseOrderModal()" class="text-[10px] bg-slate-800 text-white px-2 py-1 rounded-lg font-bold">基本量設定</button></div>
        </div>
    </header>

    <div id="app" class="p-4"></div>

    <div id="action-bar" class="hidden fixed bottom-24 left-0 right-0 px-6 z-40">
        <button id="action-bar-btn" class="submit-btn w-full py-4 rounded-2xl text-white font-bold text-lg flex items-center justify-center gap-3 active:scale-95 transition-transform"></button>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex h-20 items-center justify-around shadow-2xl z-50 text-slate-300">
        <div onclick="switchMode('inventory')" id="nav-inventory" class="flex flex-col items-center font-bold transition-all"><i class="fas fa-calculator text-lg mb-1"></i><span class="text-[9px]">收攤點貨</span></div>
        <div onclick="switchMode('revenue')" id="nav-revenue" class="flex flex-col items-center font-bold transition-all"><i class="fas fa-hand-holding-usd text-lg mb-1"></i><span class="text-[9px]">當日營收</span></div>
        <div onclick="switchMode('orders')" id="nav-orders" class="flex flex-col items-center font-bold transition-all"><i class="fas fa-list-alt text-lg mb-1"></i><span class="text-[9px]">預定管理</span></div>
        <div onclick="switchMode('factory')" id="nav-factory" class="flex flex-col items-center font-bold transition-all"><i class="fas fa-truck text-lg mb-1"></i><span class="text-[9px]">工廠叫貨</span></div>
        <div onclick="switchMode('analysis')" id="nav-analysis" class="flex flex-col items-center font-bold transition-all"><i class="fas fa-chart-line text-lg mb-1"></i><span class="text-[9px]">營業分析</span></div>
    </nav>

    <div id="session-modal" class="hidden fixed inset-0 z-[250] bg-black/80 flex items-center justify-center p-6"><div class="bg-white w-full max-w-sm rounded-[40px] p-8 shadow-2xl relative text-center"><h2 class="text-xl font-black text-slate-800 mb-6 italic">今日結算對位</h2><div class="space-y-4"><div class="grid grid-cols-2 gap-2"><select id="s-date-m"></select><select id="s-date-d"></select></div><select id="s-loc" class="font-bold text-slate-700 text-center"><option value="嘉北街">📍 嘉北街</option><option value="吉品紅豆餅">📍 吉品紅豆餅</option><option value="溪口北極殿">📍 溪口北極殿</option><option value="中正大學">📍 中正大學</option><option value="其他">📍 其他</option></select><button onclick="confirmSession()" class="w-full bg-[#bfa07a] text-white py-4 rounded-2xl font-bold text-lg mt-4 shadow-lg">進入系統</button></div></div></div>
    <div id="order-modal" class="hidden fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm flex items-end"><div class="bg-white w-full rounded-t-[40px] p-6 max-h-[95vh] overflow-hidden flex flex-col shadow-2xl"><div class="flex justify-between items-center mb-4"><h2 id="order-modal-title" class="text-xl font-black text-slate-800 italic">📝 預定單</h2><button onclick="closeOrderModal()" class="text-slate-400 text-3xl">&times;</button></div><div class="overflow-y-auto space-y-4 pb-12"><div class="bg-gray-50 p-4 rounded-3xl space-y-3"><div class="grid grid-cols-3 gap-2"><select id="o-date-m"></select><select id="o-date-d"></select><div class="flex gap-1"><select id="o-time-h"></select><select id="o-time-m"></select></div></div></div><div class="grid grid-cols-2 gap-3"><input type="text" id="o-name" placeholder="姓名" class="bg-gray-50 p-4 rounded-2xl font-bold text-center outline-none"><input type="number" id="o-phone" placeholder="末三碼" class="bg-gray-50 p-4 rounded-2xl font-bold text-center outline-none"></div><select id="o-loc-select" class="font-bold text-slate-700 text-center bg-gray-50 p-4 rounded-2xl w-full"><option value="嘉北街">📍 嘉北街</option><option value="吉品紅豆餅">📍 吉品紅豆餅</option><option value="溪口北極殿">📍 溪口北極殿</option><option value="中正大學">📍 中正大學</option><option value="其他">📍 其他</option></select><div id="order-item-picker" class="space-y-4"></div><textarea id="o-note" placeholder="備註..." class="w-full bg-gray-50 p-4 rounded-2xl font-bold h-20 outline-none"></textarea><div class="space-y-3"><button onclick="saveNewOrder()" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-bold text-lg shadow-xl">確認儲存</button><button id="delete-order-btn" onclick="deleteCurrentOrder()" class="hidden w-full bg-red-50 text-red-500 py-3 rounded-2xl font-bold text-sm">刪除此筆訂單</button></div></div></div></div>
    <div id="export-modal" class="hidden fixed inset-0 z-[300] bg-black/80 flex items-center justify-center p-6"><div class="bg-white w-full max-w-sm rounded-[30px] p-6 shadow-2xl relative flex flex-col"><button onclick="document.getElementById('export-modal').classList.add('hidden')" class="absolute top-4 right-6 text-slate-300 text-3xl font-bold">&times;</button><h2 class="text-lg font-black text-slate-800 mb-4 text-center italic">📤 系統彙整報表</h2><textarea id="export-text" class="w-full h-64 bg-gray-50 p-4 rounded-2xl text-[11px] font-bold text-slate-600 outline-none border border-gray-100 mb-4 leading-relaxed" readonly></textarea><a id="line-share-btn" href="#" target="_blank" class="w-full bg-[#06C755] text-white py-4 rounded-2xl font-black text-lg flex items-center justify-center gap-2 shadow-lg"><i class="fab fa-line text-2xl"></i> 傳送至 LINE</a></div></div>
    <div id="base-order-modal" class="hidden fixed inset-0 z-[200] bg-black/80 backdrop-blur-md flex items-end"><div class="bg-white w-full rounded-t-[40px] p-6 max-h-[95vh] overflow-hidden flex flex-col shadow-2xl"><div class="flex justify-between items-center mb-4"><h2 class="text-xl font-black text-slate-800 italic">⚙️ 基本量設定</h2><div class="text-right"><span id="base-total" class="text-lg font-black text-amber-600">$0</span></div></div><select id="base-day-select" onchange="renderBaseItemPicker()" class="mb-4 bg-amber-50 text-amber-700"><option value="1">週一</option><option value="2">週二 (出車)</option><option value="3">週三</option><option value="4">週四 (出車)</option><option value="5">週五</option><option value="6">週六</option><option value="0">週日 (出車)</option></select><div id="base-item-picker" class="overflow-y-auto space-y-4 pb-20"></div><button onclick="closeBaseOrderModal()" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-bold shadow-xl">儲存設定</button></div></div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyC2W-Zd4MLht6wz2d9Vg69Rk3azfha_LdX6RgfXYA_u7k6kYlus638HgNdkn6FkJMF8w/exec';

        const products=[{cat:"🥖 麵包區",name:"黃金牛角",price:35},{cat:"🥖 麵包區",name:"原味小菠蘿",price:35},{cat:"🥖 麵包區",name:"奶酥菠蘿",price:35},{cat:"🥖 麵包區",name:"芋頭菠蘿",price:35},{cat:"🥖 麵包區",name:"菠蘿金牛角",price:35},{cat:"🥖 麵包區",name:"楓糖小可頌",price:35},{cat:"🥖 麵包區",name:"鹽花可頌",price:35},{cat:"🥖 麵包區",name:"蘋果派",price:35},{cat:"🥖 麵包區",name:"巧克力大理石",price:35},{cat:"🥖 麵包區",name:"可可麵包捲",price:35},{cat:"🥖 麵包區",name:"奶香小餐包",price:35},{cat:"🥖 麵包區",name:"黃金小羅宋",price:35},{cat:"🥖 麵包區",name:"北海道鮮奶",price:35},{cat:"🥖 麵包區",name:"奶酥小炸彈",price:35},{cat:"🥖 麵包區",name:"牛奶克林姆",price:35},{cat:"🥖 麵包區",name:"咖啡麵包",price:35},{cat:"🥖 麵包區",name:"紅豆麵包",price:35},{cat:"🥖 麵包區",name:"肉鬆麵包",price:35},{cat:"🥖 麵包區",name:"台式肉鬆蔥捲",price:35},{cat:"🥖 麵包區",name:"明太子法國麵包",price:45},{cat:"🥖 麵包區",name:"香蒜法國麵包",price:35},{cat:"🥖 麵包區",name:"香蒜金磚吐司",price:35},{cat:"🥖 麵包區",name:"德腸夏威夷",price:35},{cat:"🥖 麵包區",name:"可可爆漿菠蘿",price:45},{cat:"🥖 麵包區",name:"巧克力QQ球",price:35},{cat:"🥖 麵包區",name:"蔓越莓雜糧",price:45},{cat:"🥖 麵包區",name:"優格蔓越莓",price:55},{cat:"🥖 麵包區",name:"肉桂核桃捲",price:55},{cat:"🥖 麵包區",name:"千層牛奶棒",price:45},{cat:"🥖 麵包區",name:"蜂蜜起酥蛋糕",price:35},{cat:"🥖 麵包區",name:"QQ布丁麵包",price:55},{cat:"🥯 貝果、吐司區",name:"原味軟貝果",price:35},{cat:"🥯 貝果、吐司區",name:"火龍果乳酪貝果",price:45},{cat:"🥯 貝果、吐司區",name:"巧克力貝果",price:45},{cat:"🥯 貝果、吐司區",name:"藍莓抹醬貝果",price:45},{cat:"🥯 貝果、吐司區",name:"三色厚片吐司",price:35},{cat:"🥯 貝果、吐司區",name:"千層小吐司",price:55},{cat:"🍰 蛋糕點心區",name:"花瓣檸檬塔",price:35},{cat:"🍰 蛋糕點心區",name:"台式小蛋塔",price:35},{cat:"🍰 蛋糕點心區",name:"蛋糕捲 (巧克力)",price:50},{cat:"🍰 蛋糕點心區",name:"蛋糕捲 (草莓)",price:50},{cat:"🍰 蛋糕點心區",name:"蛋糕捲 (芋頭)",price:50},{cat:"🍰 蛋糕點心區",name:"蛋糕捲 (香草)",price:50},{cat:"🍰 蛋糕點心區",name:"檸檬小蛋糕",price:35},{cat:"🍰 蛋糕點心區",name:"草莓小蛋糕",price:35},{cat:"🍰 蛋糕點心區",name:"檸檬布丁塔",price:35},{cat:"🍰 蛋糕點心區",name:"冰心泡芙 (巧克力)",price:35},{cat:"🍰 蛋糕點心區",name:"冰心泡芙 (草莓)",price:35},{cat:"🍰 蛋糕點心區",name:"冰心泡芙 (卡士達)",price:35},{cat:"🍰 蛋糕點心區",name:"生乳餐包",price:35},{cat:"🍰 蛋糕點心區",name:"卡士達冰心可頌",price:35},{cat:"🍰 蛋糕點心區",name:"紅豆麻糬",price:35},{cat:"🍰 蛋糕點心區",name:"台式馬卡龍 (原味)",price:50},{cat:"🍰 蛋糕點心區",name:"台式馬卡龍 (巧克力)",price:50},{cat:"🍰 蛋糕點心區",name:"台式馬卡龍 (草莓)",price:50},{cat:"🍰 蛋糕點心區",name:"珍珠糖泡芙餅乾",price:50},{cat:"🍰 蛋糕點心區",name:"法式奶油球 (巧克力)",price:120},{cat:"🍰 蛋糕點心區",name:"法式奶油球 (草莓)",price:120},{cat:"🍰 蛋糕點心區",name:"法式奶油球 (原味)",price:120},{cat:"🍰 蛋糕點心區",name:"肉鬆芋頭小貝",price:120},{cat:"🍰 蛋糕點心區",name:"帕瑪森起士棒",price:120}];

        let state = { mode: 'orders', session: { active: false, date: '', location: '', dayOfWeek: 0 }, targetOrderDate: '', inventory: {}, factory: {}, orders: [], orderDraft: {}, editOrderIndex: null, baseOrders: { 0:{}, 1:{}, 2:{}, 3:{}, 4:{}, 5:{}, 6:{} }, revenue: { cash: 0, lp: 0, costRaw: 0, fuel: 0, rent: 0, elec: 0, truckRent: 0, etc: 0, other: 0, note: '' }, availableMenu: null, cloudReport: null };

        function loadData() { const saved = localStorage.getItem('cx_inventory_data'); if(saved) { state = { ...state, ...JSON.parse(saved) }; state.orderDraft = {}; state.editOrderIndex = null; } }
        function persist() { localStorage.setItem('cx_inventory_data', JSON.stringify(state)); }

        async function syncAllCloudData() {
            if(!state.session.active) { alert("請先對位進入系統！"); return; }
            document.getElementById('loading').style.display = 'flex';
            try {
                const date = state.session.date;
                const menuRes = await fetch(`${GOOGLE_SCRIPT_URL}?action=getMenu&date=${encodeURIComponent(date)}`);
                const menuData = await menuRes.json();
                state.availableMenu = (menuData.items && menuData.items.length > 0) ? menuData.items : null;
                
                const reportRes = await fetch(`${GOOGLE_SCRIPT_URL}?action=getReports&date=${encodeURIComponent(date)}`);
                state.cloudReport = await reportRes.json();
                
                render(); alert("✅ 同步成功！");
            } catch (e) { alert("❌ 同步失敗。"); }
            document.getElementById('loading').style.display = 'none';
        }

        function confirmReset() {
            if(!confirm("清空當前頁面資料？")) return;
            if(state.mode === 'inventory') state.inventory = {};
            else if(state.mode === 'revenue') state.revenue = { cash: 0, lp: 0, costRaw: 0, fuel: 0, rent: 0, elec: 0, truckRent: 0, etc: 0, other: 0, note: '' };
            else if(state.mode === 'factory') state.factory = {};
            render(); persist();
        }

        function switchMode(m) {
            if ((m === 'inventory' || m === 'revenue' || m === 'factory') && !state.session.active) { state.tempMode = m; openSessionModal(); return; }
            state.mode = m;
            ['inventory', 'revenue', 'orders', 'factory', 'analysis'].forEach(t => { if(document.getElementById('nav-'+t)) document.getElementById('nav-'+t).classList.toggle('active-tab', t===m); });
            document.getElementById('current-mode-title').innerText = {inventory:'收攤點貨結算', revenue:'營收利潤結算', orders:'預定單管理', factory:'工廠叫貨規劃', analysis:'營業數據分析'}[m];
            const bar = document.getElementById('action-bar'), btn = document.getElementById('action-bar-btn'), resetBtn = document.getElementById('mini-reset-btn');
            if (m === 'orders' || m === 'analysis') { bar.classList.add('hidden'); resetBtn.classList.add('hidden'); } 
            else {
                bar.classList.remove('hidden'); resetBtn.classList.remove('hidden');
                if (m === 'factory') { btn.innerHTML = '<i class="fas fa-paper-plane"></i> 確認下單並輸出'; btn.onclick = exportFactory; }
                else if (m === 'inventory') { btn.innerHTML = '<i class="fas fa-box-open"></i> 確認收攤並輸出'; btn.onclick = exportInventory; }
                else if (m === 'revenue') { btn.innerHTML = '<i class="fas fa-coins"></i> 確認營收並輸出'; btn.onclick = exportRevenue; }
            }
            document.getElementById('factory-config-btn').classList.toggle('hidden', m !== 'factory');
            render(); persist();
        }

        function render() {
            const app = document.getElementById('app'); app.innerHTML = '';
            const pList = state.availableMenu ? products.filter(p => state.availableMenu.includes(p.name)) : products;
            if (state.mode === 'inventory') renderInv(app, pList);
            else if (state.mode === 'factory') renderFactory(app, pList);
            else if (state.mode === 'revenue') renderRevenue(app);
            else if (state.mode === 'orders') renderOrders(app);
            else if (state.mode === 'analysis') renderAnalysis(app);
            updateStat();
        }

        function renderInv(container, pList) {
            let cat = ''; pList.forEach((p) => {
                const idx = products.findIndex(orig => orig.name === p.name);
                if (p.cat !== cat) { cat = p.cat; container.innerHTML += `<h3 class="text-[11px] font-black text-slate-300 mt-8 mb-3 border-l-4 border-amber-200 pl-2 uppercase">【 ${cat} 】</h3>`; }
                container.innerHTML += `<div class="product-card p-4 flex items-center justify-between mb-3 shadow-sm"><div class="font-bold text-slate-700 underline decoration-slate-100 underline-offset-4">${p.name}</div><div class="flex items-center bg-gray-50 rounded-xl p-1"><button onclick="changeQty('inventory', ${idx}, -1)" class="stepper-btn">-</button><div class="w-12 text-center font-black">${state.inventory[idx] || 0}</div><button onclick="changeQty('inventory', ${idx}, 1)" class="stepper-btn">+</button></div></div>`;
            });
        }

        function renderFactory(container, pList) {
            const tom = new Date(); tom.setDate(tom.getDate() + 1);
            if(!state.targetOrderDate) state.targetOrderDate = `${tom.getMonth()+1}/${tom.getDate()}`;
            const [m, d] = state.targetOrderDate.split('/'); const tDate = new Date(new Date().getFullYear(), m-1, d);
            const tDay = tDate.getDay(); const dStr = ['日','一','二','三','四','五','六'][tDay];
            container.innerHTML = `<div class="bg-slate-800 p-6 rounded-[30px] mb-6 shadow-xl text-white text-center"><p class="text-[10px] text-slate-400 mb-2">預定到貨日期</p><div class="grid grid-cols-2 gap-2 mb-4"><select id="f-date-m" onchange="updateTargetDate()"></select><select id="f-date-d" onchange="updateTargetDate()"></select></div><p class="text-xs font-black text-amber-300">${state.targetOrderDate} (${dStr})</p></div><div id="factory-list"></div>`;
            document.getElementById('f-date-m').innerHTML = Array.from({length:12},(_,i)=>i+1).map(v=>`<option value="${v}" ${v==m?'selected':''}>${v}月</option>`).join('');
            document.getElementById('f-date-d').innerHTML = Array.from({length:31},(_,i)=>i+1).map(v=>`<option value="${v}" ${v==d?'selected':''}>${v}日</option>`).join('');
            let cat = ''; pList.forEach((p) => {
                const idx = products.findIndex(orig => orig.name === p.name);
                const base = state.baseOrders[tDay][idx] || 0;
                let oSum = 0; state.orders.forEach(o => { if(o.date === state.targetOrderDate) o.items.forEach(it => { if(it.name === p.name) oSum += it.qty; }); });
                const inv = state.inventory[idx] || 0; const suggest = Math.max(0, (base + oSum) - inv);
                if (p.cat !== cat) { cat = p.cat; container.querySelector('#factory-list').innerHTML += `<h3 class="text-[11px] font-black text-slate-300 mt-8 mb-3 border-l-4 border-amber-200 pl-2 uppercase">【 ${cat} 】</h3>`; }
                container.querySelector('#factory-list').innerHTML += `<div class="product-card p-4 flex items-center justify-between mb-3"><div><div class="font-bold text-slate-700">${p.name}</div><p class="text-[9px] text-slate-400">建議: ${suggest} (基${base}+預${oSum}-庫${inv})</p></div><div class="flex items-center bg-white rounded-xl p-1 border border-gray-100"><button onclick="changeQty('factory', ${idx}, -1)" class="stepper-btn">-</button><div class="w-12 text-center font-black">${state.factory[idx] === undefined ? suggest : state.factory[idx]}</div><button onclick="changeQty('factory', ${idx}, 1)" class="stepper-btn">+</button></div></div>`;
            });
        }

        function renderRevenue(container) {
            container.innerHTML = `<div class="space-y-6"><div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100"><div class="flex justify-between mb-4"><h3 class="text-xs font-black text-[#bfa07a] uppercase">單日結算</h3><span class="text-[10px] font-bold bg-slate-100 px-2 py-1 rounded">${state.session.date}</span></div><div class="grid grid-cols-2 gap-4"><input type="number" id="rev-cash" oninput="saveRev()" placeholder="現金" value="${state.revenue.cash||''}" class="bg-gray-50 p-4 rounded-2xl font-bold text-center outline-none"><input type="number" id="rev-lp" oninput="saveRev()" placeholder="LinePay" value="${state.revenue.lp||''}" class="bg-gray-50 p-4 rounded-2xl font-bold text-center outline-none"></div></div><div class="bg-amber-50/30 p-6 rounded-3xl border border-amber-100"><div class="flex justify-between mb-4"><h3 class="text-xs font-black text-amber-600 uppercase">貨單成本</h3><span id="discount-tag" class="text-[10px] font-bold"></span></div><input type="number" id="rev-cost-raw" oninput="saveRev()" placeholder="總原價" value="${state.revenue.costRaw||''}" class="w-full bg-white p-4 rounded-2xl font-black text-amber-700 text-center outline-none border border-amber-100 shadow-inner"></div><div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm"><h3 class="text-xs font-black text-red-400 uppercase mb-4">支出明細</h3><div class="grid grid-cols-2 gap-3"><input type="number" id="exp-fuel" oninput="saveRev()" placeholder="加油" value="${state.revenue.fuel||''}" class="bg-gray-50 p-3 rounded-xl text-sm text-center outline-none"><input type="number" id="exp-rent" oninput="saveRev()" placeholder="場地租金" value="${state.revenue.rent||''}" class="bg-gray-50 p-3 rounded-xl text-sm text-center outline-none"><input type="number" id="exp-elec" oninput="saveRev()" placeholder="電費清潔" value="${state.revenue.elec||''}" class="bg-gray-50 p-3 rounded-xl text-sm text-center outline-none"><input type="number" id="exp-truckRent" oninput="saveRev()" placeholder="餐車租金" value="${state.revenue.truckRent||''}" class="bg-gray-50 p-3 rounded-xl text-sm text-center outline-none"><input type="number" id="exp-etc" oninput="saveRev()" placeholder="ETC" value="${state.revenue.etc||''}" class="bg-gray-50 p-3 rounded-xl text-sm text-center outline-none"><input type="number" id="exp-other" oninput="saveRev()" placeholder="雜項" value="${state.revenue.other||''}" class="bg-gray-50 p-3 rounded-xl text-sm text-center outline-none"><input type="text" id="exp-note" oninput="saveRev()" placeholder="備註..." value="${state.revenue.note||''}" class="bg-gray-50 p-3 rounded-xl text-sm text-center outline-none col-span-2"></div></div></div>`;
            updateStat();
        }

        function renderOrders(container) {
            state.orders.sort((a,b)=>{ const da=a.date.split('/').map(n=>n.padStart(2,'0')).join(''), db=b.date.split('/').map(n=>n.padStart(2,'0')).join(''); if(da!==db) return da.localeCompare(db); return a.time.localeCompare(b.time); });
            container.innerHTML = `<button onclick="openOrderModal()" class="w-full bg-[#bfa07a] text-white py-4 rounded-2xl font-bold shadow-lg mb-6"><i class="fas fa-plus-circle mr-2"></i>新增預定單</button><div class="space-y-4" id="order-list-box"></div>`;
            if(state.orders.length===0) { document.getElementById('order-list-box').innerHTML = '<p class="text-center text-slate-400 py-10 font-bold italic">目前無資料</p>'; return; }
            state.orders.forEach((o, idx) => {
                document.getElementById('order-list-box').innerHTML += `<div class="order-swipe-container"><div class="swipe-bg"><i class="fas fa-check"></i> 已取餐</div><div class="order-item-content p-5 rounded-[30px] border border-gray-100 shadow-sm relative"><button onclick="editOrder(${idx})" class="absolute top-4 right-4 text-slate-300"><i class="fas fa-pen"></i></button><div><span class="text-[10px] bg-slate-100 text-slate-500 px-2 py-1 rounded font-black italic">${o.date} ${o.time}</span><h4 class="font-black text-slate-700 mt-2 text-lg">${o.name} (${o.phone})</h4><p class="text-[10px] text-slate-400 mt-1"><i class="fas fa-map-marker-alt"></i> ${o.location}</p></div><span class="absolute top-12 right-4 text-amber-600 font-black text-lg">$${o.total}</span><div class="border-t border-dashed border-gray-100 mt-3 pt-2 text-[11px] text-slate-500 font-bold">${o.items.map(i=>`${i.name}x${i.qty}`).join('、')}</div></div></div>`;
            });
        }

        function renderAnalysis(container) {
            if(!state.cloudReport) {
                container.innerHTML = `<div class="p-10 text-center"><i class="fas fa-cloud-download-alt text-4xl text-slate-200 mb-4"></i><button onclick="syncAllCloudData()" class="bg-amber-500 text-white px-6 py-3 rounded-2xl font-bold">讀取雲端報表</button></div>`;
                return;
            }
            let html = `<div class="space-y-6"><h2 class="text-lg font-black text-slate-800 italic">📅 ${state.session.date} 雲端對帳單</h2>`;
            if(state.cloudReport.revenue) {
                const r = state.cloudReport.revenue;
                html += `<div class="bg-white p-6 rounded-[30px] shadow-sm border border-gray-100"><div class="grid grid-cols-2 gap-4 text-center"><div class="bg-gray-50 p-3 rounded-2xl"><p class="text-[9px] text-slate-400 uppercase">總營收</p><p class="text-lg font-black text-slate-700">$${(Number(r["現金"])||0)+(Number(r["LinePay"])||0)}</p></div><div class="bg-gray-50 p-3 rounded-2xl"><p class="text-[9px] text-slate-400 uppercase">今日純利</p><p class="text-lg font-black text-green-600">$${Math.round(r["純利"])||0}</p></div></div></div>`;
            }
            if(state.cloudReport.inventory) {
                html += `<div class="bg-white p-6 rounded-[30px] shadow-sm border border-gray-100"><h3 class="text-xs font-black text-slate-400 uppercase mb-4">📦 雲端剩餘庫存</h3>`;
                for(let key in state.cloudReport.inventory) { if(state.cloudReport.inventory[key] > 0) html += `<div class="flex justify-between text-xs font-bold mb-1"><span>${key}</span><span class="text-amber-600">${state.cloudReport.inventory[key]}個</span></div>`; }
                html += `</div>`;
            }
            container.innerHTML = html;
        }

        async function syncToCloud(sheet, data) { document.getElementById('loading').style.display='flex'; try { await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ targetSheet: sheet, sessionDate: state.session.date, sessionLocation: state.session.location, data: data }) }); } catch (e) {} document.getElementById('loading').style.display='none'; }
        function showExportModal(txt) { document.getElementById('export-text').value = txt; document.getElementById('line-share-btn').href = `https://line.me/R/msg/text/?${encodeURIComponent(txt)}`; document.getElementById('export-modal').classList.remove('hidden'); }
        async function exportInventory() { let t=0; let cloud={}; products.forEach((p,i)=>{ if(state.inventory[i]>0) { t+=state.inventory[i]*p.price; cloud[p.name]=state.inventory[i]; } }); await syncToCloud('Inventory', cloud); showExportModal(`📦【 埕心 | 庫存報表 】\n日期：${state.session.date}\n庫存金額：${t}元`); }
        async function exportRevenue() { const disc=state.revenue.costRaw>=12000?0.5:0.55; const totalExp=state.revenue.fuel+state.revenue.rent+state.revenue.elec+state.revenue.truckRent+state.revenue.etc+state.revenue.other; const net=(state.revenue.cash+state.revenue.lp)-(state.revenue.costRaw*disc)-totalExp; await syncToCloud('Revenue', {"現金":state.revenue.cash,"LinePay":state.revenue.lp,"成本":state.revenue.costRaw*disc,"純利":net,"備註":state.revenue.note}); showExportModal(`💰【 埕心 | 營收報表 】\n日期：${state.session.date}\n純利：${Math.round(net)}元`); }
        async function exportFactory() { let cloud={}; products.forEach((p,i)=>{ if(state.factory[i]>0) cloud[p.name]=state.factory[i]; }); await syncToCloud('Factory', cloud); showExportModal(`🚚【 埕心 | 叫貨單 】\n日期：${state.targetOrderDate}`); }
        
        function updateStat() {
            const val = document.getElementById('stat-value'), lab = document.getElementById('current-mode-title');
            if (state.mode === 'inventory') { let t = 0; products.forEach((p, i) => t += (state.inventory[i] || 0) * p.price); val.innerText = '$' + t; }
            else if (state.mode === 'factory') { let t = 0; products.forEach((p, i) => t += (state.factory[i] || 0) * p.price); val.innerText = '$' + t; }
            else if (state.mode === 'revenue') { 
                const disc = state.revenue.costRaw >= 12000 ? 0.5 : 0.55; if(document.getElementById('discount-tag')) document.getElementById('discount-tag').innerText=`適用 ${disc*10} 折`;
                const totalExp = state.revenue.fuel + state.revenue.rent + state.revenue.elec + state.revenue.truckRent + state.revenue.etc + state.revenue.other;
                const net = (state.revenue.cash + state.revenue.lp) - (state.revenue.costRaw * disc) - totalExp; val.innerText = '$' + Math.round(net);
            } else if (state.mode === 'orders') { let t = 0; state.orders.forEach(o => t += o.total); val.innerText = '$' + t; }
        }

        function openSessionModal() { document.getElementById('session-modal').classList.remove('hidden'); const now = new Date(); document.getElementById('s-date-m').innerHTML = Array.from({length:12},(_,i)=>i+1).map(m=>`<option value="${m}" ${now.getMonth()+1===m?'selected':''}>${m}月</option>`).join(''); document.getElementById('s-date-d').innerHTML = Array.from({length:31},(_,i)=>i+1).map(d=>`<option value="${d}" ${now.getDate()===d?'selected':''}>${d}日</option>`).join(''); }
        function closeSessionModal() { document.getElementById('session-modal').classList.add('hidden'); switchMode('orders'); }
        function confirmSession() { state.session.active = true; state.session.date = `${document.getElementById('s-date-m').value}/${document.getElementById('s-date-d').value}`; state.session.location = document.getElementById('s-loc').value; document.getElementById('session-modal').classList.add('hidden'); document.getElementById('session-tag').classList.remove('hidden'); syncAllCloudData(); switchMode(state.tempMode || 'inventory'); }
        function updateTargetDate() { state.targetOrderDate = `${document.getElementById('f-date-m').value}/${document.getElementById('f-date-d').value}`; state.factory = {}; render(); persist(); }
        function saveRev() { state.revenue = { cash: Number(document.getElementById('rev-cash').value), lp: Number(document.getElementById('rev-lp').value), costRaw: Number(document.getElementById('rev-cost-raw').value), fuel: Number(document.getElementById('exp-fuel').value), rent: Number(document.getElementById('exp-rent').value), elec: Number(document.getElementById('exp-elec').value), truckRent: Number(document.getElementById('exp-truckRent').value), etc: Number(document.getElementById('exp-etc').value), other: Number(document.getElementById('exp-other').value), note: document.getElementById('exp-note').value }; updateStat(); persist(); }
        function changeQty(type, i, d) { if(type === 'inventory') state.inventory[i] = Math.max(0, (state.inventory[i] || 0) + d); else if(type === 'factory') state.factory[i] = Math.max(0, (state.factory[i] || 0) + d); else if(type === 'draft') { state.orderDraft[i] = Math.max(0, (state.orderDraft[i] || 0) + d); document.getElementById(`draft-qty-${i}`).innerText = state.orderDraft[i]; } render(); persist(); }
        function openOrderModal() { state.orderDraft={}; state.editOrderIndex=null; document.getElementById('order-modal-title').innerText='📝 新增預定單'; document.getElementById('delete-order-btn').classList.add('hidden'); document.getElementById('o-name').value=''; document.getElementById('o-phone').value=''; document.getElementById('o-note').value=''; const now=new Date(); document.getElementById('o-date-m').innerHTML=Array.from({length:12},(_,i)=>i+1).map(m=>`<option value="${m}" ${m==now.getMonth()+1?'selected':''}>${m}月</option>`).join(''); document.getElementById('o-date-d').innerHTML=Array.from({length:31},(_,i)=>i+1).map(d=>`<option value="${d}" ${d==now.getDate()?'selected':''}>${d}日</option>`).join(''); document.getElementById('o-time-h').innerHTML=Array.from({length:24},(_,i)=>i).map(h=>`<option value="${h}">${h<10?'0'+h:h}點</option>`).join(''); document.getElementById('o-time-m').innerHTML=Array.from({length:60},(_,i)=>i).map(m=>`<option value="${m}">${m<10?'0'+m:m}分</option>`).join(''); document.getElementById('order-modal').classList.remove('hidden'); renderOrderItemPicker(); }
        function editOrder(idx) { state.editOrderIndex=idx; const o=state.orders[idx]; document.getElementById('order-modal-title').innerText='✏️ 修改預定單'; document.getElementById('delete-order-btn').classList.remove('hidden'); const [m,d]=o.date.split('/'), [h,min]=o.time.split(':'); document.getElementById('o-name').value=o.name; document.getElementById('o-phone').value=o.phone; document.getElementById('o-note').value=o.note||''; document.getElementById('o-date-m').value=parseInt(m); document.getElementById('o-date-d').value=parseInt(d); document.getElementById('o-time-h').value=parseInt(h); document.getElementById('o-time-m').value=parseInt(min); document.getElementById('o-loc-select').value=o.location; state.orderDraft={}; products.forEach((p,i)=>{ const itm=o.items.find(it=>it.name===p.name); if(itm) state.orderDraft[i]=itm.qty; }); document.getElementById('order-modal').classList.remove('hidden'); renderOrderItemPicker(); }
        function deleteCurrentOrder() { if(confirm("刪除此訂單？")) { state.orders.splice(state.editOrderIndex,1); closeOrderModal(); render(); persist(); } }
        function saveNewOrder() { const its=[]; let t=0; products.forEach((p,i)=>{ const q=state.orderDraft[i]||0; if(q>0){ its.push({name:p.name,qty:q}); t+=p.price*q; } }); const newO={ date:`${document.getElementById('o-date-m').value}/${document.getElementById('o-date-d').value}`, time:`${document.getElementById('o-time-h').value.padStart(2,'0')}:${document.getElementById('o-time-m').value.padStart(2,'0')}`, name:document.getElementById('o-name').value, phone:document.getElementById('o-phone').value, location:document.getElementById('o-loc-select').value, note:document.getElementById('o-note').value, items:its, total:t }; if(state.editOrderIndex!==null) state.orders[state.editOrderIndex]=newO; else state.orders.push(newO); closeOrderModal(); render(); persist(); }
        function renderOrderItemPicker() { const p=document.getElementById('order-item-picker'); p.innerHTML=''; let cat=''; (state.availableMenu?products.filter(pr=>state.availableMenu.includes(pr.name)):products).forEach((prod)=>{ if(prod.cat!==cat){ cat=prod.cat; p.innerHTML+=`<h3 class="text-[10px] font-black text-slate-300 text-center uppercase mt-4">【 ${cat} 】</h3>`; } const realIdx=products.findIndex(orig=>orig.name===prod.name); p.innerHTML+= `<div class="bg-white p-3 rounded-2xl flex items-center justify-between shadow-sm border border-gray-100 mb-2"><span>${prod.name}</span><div class="flex items-center"><button onclick="changeQty('draft',${realIdx},-1)" class="stepper-btn">-</button><div id="draft-qty-${realIdx}" class="w-8 text-center font-bold">${state.orderDraft[realIdx]||0}</div><button onclick="changeQty('draft',${realIdx},1)" class="stepper-btn">+</button></div></div>`; }); }
        function closeOrderModal() { document.getElementById('order-modal').classList.add('hidden'); }
        function openBaseOrderModal() { document.getElementById('base-order-modal').classList.remove('hidden'); renderBaseItemPicker(); }
        function closeBaseOrderModal() { document.getElementById('base-order-modal').classList.add('hidden'); render(); }
        function changeBaseQty(day, i, d) { state.baseOrders[day][i] = Math.max(0, (state.baseOrders[day][i] || 0) + d); renderBaseItemPicker(); persist(); }
        function renderBaseItemPicker() { const day = document.getElementById('base-day-select').value, picker = document.getElementById('base-item-picker'); picker.innerHTML = ''; let total = 0; products.forEach((p, i) => { const qty = state.baseOrders[day][i] || 0; total += qty * p.price; picker.innerHTML += `<div class="bg-gray-50 p-4 rounded-2xl flex items-center justify-between mb-2"><span>${p.name}</span><div class="flex items-center"><button onclick="changeBaseQty(${day}, ${i}, -1)" class="w-8 h-8">-</button><span class="mx-3">${qty}</span><button onclick="changeBaseQty(${day}, ${i}, 1)" class="w-8 h-8">+</button></div></div>`; }); document.getElementById('base-total').innerText = '$' + total; }

        loadData(); switchMode('orders');
    </script>
</body>
</html>
