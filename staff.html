<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>埕心 Select | 現場專用版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fcfaf7; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .product-card { background: #fff; border-radius: 20px; border: 1px solid #f1f1f1; transition: all 0.2s; }
        .active-tab { color: #bfa07a !important; border-bottom: 3px solid #bfa07a; }
        .submit-btn { background: linear-gradient(135deg, #bfa07a 0%, #a68a64 100%); box-shadow: 0 10px 20px rgba(191, 160, 122, 0.3); }
        .stepper-btn { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; background: #fff; color: #bfa07a; border: 1px solid #eee; border-radius: 10px; }
        select { -webkit-appearance: none; appearance: none; background: #f9f9f9; border: none; padding: 10px; border-radius: 15px; font-weight: bold; color: #333; width: 100%; text-align: center; text-align-last: center; border: 1px solid #eee; outline: none; }
        .loading-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center; color:white; font-weight:bold; flex-direction: column; gap: 15px; }
    </style>
</head>
<body class="pb-36">
    <div id="loading" class="loading-overlay"><div class="animate-spin text-4xl"><i class="fas fa-sync-alt"></i></div><span>雲端同步中...</span></div>

    <header class="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-gray-100 px-6 py-5 flex justify-between items-center shadow-sm">
        <div>
            <div class="flex items-center gap-2">
                <h1 class="text-2xl font-black text-slate-800 italic uppercase tracking-tighter">【 埕心 Select 】</h1>
                <span id="session-tag" class="text-[9px] bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-bold hidden">結算中</span>
            </div>
            <p id="current-mode-title" class="text-[10px] text-slate-400 font-bold mt-1 tracking-widest uppercase">現場專用版</p>
        </div>
        <div class="text-right flex flex-col items-end">
            <span id="stat-value" class="text-xl font-black text-red-500">$0</span>
            <button id="mini-reset-btn" onclick="confirmReset()" class="hidden text-[10px] bg-slate-100 text-slate-400 px-2 py-1 rounded-lg font-bold border border-slate-200 active:bg-slate-200 transition-all mt-1"><i class="fas fa-eraser mr-1"></i>清空本頁</button>
        </div>
    </header>

    <div id="app" class="p-4"></div>

    <div id="action-bar" class="hidden fixed bottom-24 left-0 right-0 px-6 z-40">
        <button id="action-bar-btn" class="submit-btn w-full py-4 rounded-2xl text-white font-bold text-lg flex items-center justify-center gap-3 active:scale-95 transition-transform"></button>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex h-20 items-center justify-around shadow-2xl z-50 text-slate-300">
        <div onclick="switchMode('inventory')" id="nav-inventory" class="flex flex-col items-center font-bold transition-all w-1/2 border-r border-gray-50"><i class="fas fa-calculator text-xl mb-1"></i><span class="text-[11px] mt-1">收攤點貨</span></div>
        <div onclick="switchMode('revenue')" id="nav-revenue" class="flex flex-col items-center font-bold transition-all w-1/2"><i class="fas fa-hand-holding-usd text-xl mb-1"></i><span class="text-[11px] mt-1">當日營收</span></div>
    </nav>

    <div id="export-modal" class="hidden fixed inset-0 z-[300] bg-black/80 backdrop-blur-md flex items-center justify-center p-6"><div class="bg-white w-full max-w-sm rounded-[30px] p-6 shadow-2xl relative flex flex-col"><button onclick="document.getElementById('export-modal').classList.add('hidden')" class="absolute top-4 right-6 text-slate-300 text-3xl font-bold">&times;</button><h2 class="text-lg font-black text-slate-800 mb-4 text-center italic">📤 系統彙整報表</h2><textarea id="export-text" class="w-full h-64 bg-gray-50 p-4 rounded-2xl text-[11px] font-bold text-slate-600 outline-none border border-gray-100 mb-4 leading-relaxed" readonly></textarea><a id="line-share-btn" href="#" target="_blank" class="w-full bg-[#06C755] text-white py-4 rounded-2xl font-black text-lg flex items-center justify-center gap-2 shadow-lg"><i class="fab fa-line text-2xl"></i> 傳送至 LINE</a></div></div>
    <div id="session-modal" class="hidden fixed inset-0 z-[250] bg-black/80 flex items-center justify-center p-6"><div class="bg-white w-full max-w-sm rounded-[40px] p-8 shadow-2xl relative text-center"><h2 class="text-xl font-black text-slate-800 mb-6 italic">今日結算對位</h2><div class="space-y-4"><div class="grid grid-cols-2 gap-2"><select id="s-date-m"></select><select id="s-date-d"></select></div><select id="s-loc" class="font-bold text-slate-700 text-center"><option value="嘉北街">📍 嘉北街</option><option value="吉品紅豆餅">📍 吉品紅豆餅</option><option value="溪口北極殿">📍 溪口北極殿</option><option value="中正大學">📍 中正大學</option><option value="其他">📍 其他</option></select><button onclick="confirmSession()" class="w-full bg-[#bfa07a] text-white py-4 rounded-2xl font-bold text-lg mt-4 shadow-lg">確認開班</button></div></div></div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyC2W-Zd4MLht6wz2d9Vg69Rk3azfha_LdX6RgfXYA_u7k6kYlus638HgNdkn6FkJMF8w/exec';

        const products=[{cat:"🥖 麵包區",name:"黃金牛角",price:35},{cat:"🥖 麵包區",name:"原味小菠蘿",price:35},{cat:"🥖 麵包區",name:"奶酥菠蘿",price:35},{cat:"🥖 麵包區",name:"芋頭菠蘿",price:35},{cat:"🥖 麵包區",name:"菠蘿金牛角",price:35},{cat:"🥖 麵包區",name:"楓糖小可頌",price:35},{cat:"🥖 麵包區",name:"鹽花可頌",price:35},{cat:"🥖 麵包區",name:"蘋果派",price:35},{cat:"🥖 麵包區",name:"巧克力大理石",price:35},{cat:"🥖 麵包區",name:"可可麵包捲",price:35},{cat:"🥖 麵包區",name:"奶香小餐包",price:35},{cat:"🥖 麵包區",name:"黃金小羅宋",price:35},{cat:"🥖 麵包區",name:"北海道鮮奶",price:35},{cat:"🥖 麵包區",name:"奶酥小炸彈",price:35},{cat:"🥖 麵包區",name:"牛奶克林姆",price:35},{cat:"🥖 麵包區",name:"咖啡麵包",price:35},{cat:"🥖 麵包區",name:"紅豆麵包",price:35},{cat:"🥖 麵包區",name:"肉鬆麵包",price:35},{cat:"🥖 麵包區",name:"台式肉鬆蔥捲",price:35},{cat:"🥖 麵包區",name:"明太子法國麵包",price:45},{cat:"🥖 麵包區",name:"香蒜法國麵包",price:35},{cat:"🥖 麵包區",name:"香蒜金磚吐司",price:35},{cat:"🥖 麵包區",name:"德腸夏威夷",price:35},{cat:"🥖 麵包區",name:"可可爆漿菠蘿",price:45},{cat:"🥖 麵包區",name:"巧克力QQ球",price:35},{cat:"🥖 麵包區",name:"蔓越莓雜糧",price:45},{cat:"🥖 麵包區",name:"優格蔓越莓",price:55},{cat:"🥖 麵包區",name:"肉桂核桃捲",price:55},{cat:"🥖 麵包區",name:"千層牛奶棒",price:45},{cat:"🥖 麵包區",name:"蜂蜜起酥蛋糕",price:35},{cat:"🥖 麵包區",name:"QQ布丁麵包",price:55},{cat:"🥯 貝果、吐司區",name:"原味軟貝果",price:35},{cat:"🥯 貝果、吐司區",name:"火龍果乳酪貝果",price:45},{cat:"🥯 貝果、吐司區",name:"巧克力貝果",price:45},{cat:"🥯 貝果、吐司區",name:"藍莓抹醬貝果",price:45},{cat:"🥯 貝果、吐司區",name:"三色厚片吐司",price:35},{cat:"🥯 貝果、吐司區",name:"千層小吐司",price:55},{cat:"🍰 蛋糕點心區",name:"花瓣檸檬塔",price:35},{cat:"🍰 蛋糕點心區",name:"台式小蛋塔",price:35},{cat:"🍰 蛋糕點心區",name:"蛋糕捲 (巧克力)",price:50},{cat:"🍰 蛋糕點心區",name:"蛋糕捲 (草莓)",price:50},{cat:"🍰 蛋糕點心區",name:"蛋糕捲 (芋頭)",price:50},{cat:"🍰 蛋糕點心區",name:"蛋糕捲 (香草)",price:50},{cat:"🍰 蛋糕點心區",name:"檸檬小蛋糕",price:35},{cat:"🍰 蛋糕點心區",name:"草莓小蛋糕",price:35},{cat:"🍰 蛋糕點心區",name:"檸檬布丁塔",price:35},{cat:"🍰 蛋糕點心區",name:"冰心泡芙 (巧克力)",price:35},{cat:"🍰 蛋糕點心區",name:"冰心泡芙 (草莓)",price:35},{cat:"🍰 蛋糕點心區",name:"冰心泡芙 (卡士達)",price:35},{cat:"🍰 蛋糕點心區",name:"生乳餐包",price:35},{cat:"🍰 蛋糕點心區",name:"卡士達冰心可頌",price:35},{cat:"🍰 蛋糕點心區",name:"紅豆麻糬",price:35},{cat:"🍰 蛋糕點心區",name:"台式馬卡龍 (原味)",price:50},{cat:"🍰 蛋糕點心區",name:"台式馬卡龍 (巧克力)",price:50},{cat:"🍰 蛋糕點心區",name:"台式馬卡龍 (草莓)",price:50},{cat:"🍰 蛋糕點心區",name:"珍珠糖泡芙餅乾",price:50},{cat:"🍰 蛋糕點心區",name:"法式奶油球 (巧克力)",price:120},{cat:"🍰 蛋糕點心區",name:"法式奶油球 (草莓)",price:120},{cat:"🍰 蛋糕點心區",name:"法式奶油球 (原味)",price:120},{cat:"🍰 蛋糕點心區",name:"肉鬆芋頭小貝",price:120},{cat:"🍰 蛋糕點心區",name:"帕瑪森起士棒",price:120}];

        let state = {
            mode: 'inventory', session: { active: false, date: '', location: '', dayOfWeek: 0 },
            inventory: {}, revenue: { cash: 0, lp: 0, costRaw: 0, fuel: 0, rent: 0, elec: 0, truckRent: 0, etc: 0, other: 0, note: '' }
        };

        function loadData() { const saved = localStorage.getItem('cx_staff_data'); if(saved) { state = { ...state, ...JSON.parse(saved) }; } }
        function persist() { localStorage.setItem('cx_staff_data', JSON.stringify(state)); }

        async function syncToCloud(sheetName, dataObj) {
            document.getElementById('loading').style.display = 'flex';
            try { await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ targetSheet: sheetName, sessionDate: state.session.date, sessionLocation: state.session.location, data: dataObj }) }); } catch (e) {}
            document.getElementById('loading').style.display = 'none';
        }

        function confirmReset() {
            if(!confirm("確定要清空「當前頁面」的數據嗎？\n\n(這不會影響已傳送到試算表的資料)")) return;
            if(state.mode === 'inventory') state.inventory = {};
            else if(state.mode === 'revenue') state.revenue = { cash:0, lp:0, costRaw:0, fuel:0, rent:0, elec:0, truckRent:0, etc:0, other:0, note:'' };
            render(); persist();
        }

        function switchMode(m) {
            if (!state.session.active) { state.tempMode = m; openSessionModal(); return; }
            state.mode = m;
            ['inventory', 'revenue'].forEach(t => { if(document.getElementById('nav-'+t)) document.getElementById('nav-'+t).classList.toggle('active-tab', t===m); });
            document.getElementById('current-mode-title').innerText = {inventory:'收攤點貨結算', revenue:'營收利潤結算'}[m];
            const bar = document.getElementById('action-bar'), btn = document.getElementById('action-bar-btn'), resetBtn = document.getElementById('mini-reset-btn');
            bar.classList.remove('hidden'); resetBtn.classList.remove('hidden');
            if (m === 'inventory') { btn.innerHTML = '<i class="fas fa-box-open"></i> 確認收攤並傳送'; btn.onclick = exportInventory; }
            else if (m === 'revenue') { btn.innerHTML = '<i class="fas fa-coins"></i> 確認營收並傳送'; btn.onclick = exportRevenue; }
            render(); persist();
        }

        function render() {
            const app = document.getElementById('app'); app.innerHTML = '';
            if (state.mode === 'inventory') renderProducts(app);
            else if (state.mode === 'revenue') renderRevenue(app);
            updateStat();
        }

        function renderProducts(container) {
            let cat = ''; products.forEach((p, i) => {
                if (p.cat !== cat) { cat = p.cat; container.innerHTML += `<h3 class="text-[11px] font-black text-slate-300 mb-3 mt-8 ml-2 uppercase border-l-4 border-amber-200 pl-2 tracking-widest">【 ${cat.replace(/🥖 |🥯 |🍰 /g, '')} 】</h3>`; }
                container.innerHTML += `<div class="product-card p-4 flex items-center justify-between shadow-sm mb-3"><div class="flex-1"><div class="font-bold text-slate-700">${p.name}</div><p class="text-[10px] text-slate-300 mt-1">今日剩餘</p></div><div class="flex items-center bg-gray-50 rounded-xl p-1 border border-gray-100"><button onclick="changeQty(${i}, -1)" class="stepper-btn shadow-sm active:bg-gray-100"><i class="fas fa-minus text-xs"></i></button><div class="w-12 text-center font-black text-slate-700">${state.inventory[i] || 0}</div><button onclick="changeQty(${i}, 1)" class="stepper-btn shadow-sm active:bg-gray-100"><i class="fas fa-plus text-xs"></i></button></div></div>`;
            });
        }

        function renderRevenue(container) {
            container.innerHTML = `<div class="space-y-6"><div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm"><div class="flex justify-between items-center mb-4"><h3 class="text-xs font-black text-[#bfa07a] uppercase tracking-widest">單日結算</h3><span class="text-[10px] bg-slate-100 px-2 py-1 rounded font-bold italic">${state.session.date} @ ${state.session.location}</span></div><div class="grid grid-cols-2 gap-4"><input type="number" inputmode="decimal" id="rev-cash" oninput="saveRev()" placeholder="現金" value="${state.revenue.cash||''}" class="bg-gray-50 p-4 rounded-2xl font-bold text-center outline-none"><input type="number" inputmode="decimal" id="rev-lp" oninput="saveRev()" placeholder="LinePay" value="${state.revenue.lp||''}" class="bg-gray-50 p-4 rounded-2xl font-bold text-center outline-none"></div></div><div class="bg-amber-50/30 p-6 rounded-3xl border border-amber-100"><div class="flex justify-between mb-4"><h3 class="text-xs font-black text-amber-600 uppercase">貨單成本</h3><span id="discount-tag" class="text-[10px] font-bold"></span></div><input type="number" inputmode="decimal" id="rev-cost-raw" oninput="saveRev()" placeholder="總原價" value="${state.revenue.costRaw||''}" class="w-full bg-white p-4 rounded-2xl font-black text-amber-700 text-center outline-none border border-amber-100 shadow-inner"></div><div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm"><h3 class="text-xs font-black text-red-400 uppercase mb-4">支出明細</h3><div class="grid grid-cols-2 gap-3"><input type="number" inputmode="decimal" id="exp-fuel" oninput="saveRev()" placeholder="加油" value="${state.revenue.fuel||''}" class="bg-gray-50 p-3 rounded-xl text-sm text-center outline-none"><input type="number" inputmode="decimal" id="exp-rent" oninput="saveRev()" placeholder="場地租金" value="${state.revenue.rent||''}" class="bg-gray-50 p-3 rounded-xl text-sm text-center outline-none"><input type="number" inputmode="decimal" id="exp-elec" oninput="saveRev()" placeholder="電費清潔費" value="${state.revenue.elec||''}" class="bg-gray-50 p-3 rounded-xl text-sm text-center outline-none"><input type="number" inputmode="decimal" id="exp-truckRent" oninput="saveRev()" placeholder="餐車租金" value="${state.revenue.truckRent||''}" class="bg-gray-50 p-3 rounded-xl text-sm text-center outline-none"><input type="number" inputmode="decimal" id="exp-etc" oninput="saveRev()" placeholder="ETC" value="${state.revenue.etc||''}" class="bg-gray-50 p-3 rounded-xl text-sm text-center outline-none"><input type="number" inputmode="decimal" id="exp-other" oninput="saveRev()" placeholder="雜項" value="${state.revenue.other||''}" class="bg-gray-50 p-3 rounded-xl text-sm text-center outline-none col-span-2"><input type="text" id="exp-note" oninput="saveRev()" placeholder="備註..." value="${state.revenue.note||''}" class="bg-gray-50 p-3 rounded-xl text-sm text-center outline-none col-span-2"></div></div></div>`;
            updateStat();
        }

        function showExportModal(text) { document.getElementById('export-text').value = text; document.getElementById('line-share-btn').href = `https://line.me/R/msg/text/?${encodeURIComponent(text)}`; document.getElementById('export-modal').classList.remove('hidden'); }
        
        async function exportInventory() { 
            let totalVal = 0; products.forEach((p, i) => totalVal += (state.inventory[i] || 0) * p.price);
            const dStr = ['日','一','二','三','四','五','六'][state.session.dayOfWeek];
            let txt = `📦【 鍇埕 | 收攤庫存 】\n📅 日期：${state.session.date}(${dStr})\n📍 地點：${state.session.location}\n💰 庫存：${totalVal}元\n------------------\n`; 
            let cloud = {}; let hasAny = false;
            products.forEach((p, i) => { if(state.inventory[i] > 0) { txt += `🔸 ${p.name}：${state.inventory[i]} 個\n`; cloud[p.name] = state.inventory[i]; hasAny = true; } }); 
            if(!hasAny) txt += "本日無庫存剩餘。\n";
            await syncToCloud('Inventory', cloud); showExportModal(txt); 
        }

        async function exportRevenue() { 
            const disc = state.revenue.costRaw >= 12000 ? 0.5 : 0.55; const totalExp = state.revenue.fuel + state.revenue.rent + state.revenue.elec + state.revenue.truckRent + state.revenue.etc + state.revenue.other;
            const net = (state.revenue.cash + state.revenue.lp) - (state.revenue.costRaw * disc) - totalExp; 
            const dStr = ['日','一','二','三','四','五','六'][state.session.dayOfWeek];
            let txt = `💰【 鍇埕 | 營收報表 】\n📅 日期：${state.session.date}(${dStr})\n📍 地點：${state.session.location}\n------------------\n💵 總營收：$${state.revenue.cash + state.revenue.lp}\nLINE PAY：$${state.revenue.lp}\n📦 進貨成本：$${state.revenue.costRaw * disc}\n💸 支出明細：$${totalExp}\n`;
            if(state.revenue.note) txt += `📝 備註：${state.revenue.note}\n`;
            txt += `------------------\n✨ 今日收益：$${Math.round(net)}`;
            const cloudData = { "現金": state.revenue.cash, "LinePay": state.revenue.lp, "成本": state.revenue.costRaw * disc, "加油": state.revenue.fuel, "場地租金": state.revenue.rent, "電費清潔費": state.revenue.elec, "餐車租金": state.revenue.truckRent, "ETC": state.revenue.etc, "雜項": state.revenue.other, "純利": Math.round(net), "備註": state.revenue.note };
            await syncToCloud('Revenue', cloudData); showExportModal(txt); 
        }

        function updateStat() {
            const val = document.getElementById('stat-value'), lab = document.getElementById('stat-label');
            if (state.mode === 'inventory') { let t = 0; products.forEach((p, i) => t += (state.inventory[i] || 0) * p.price); val.innerText = '$' + t.toLocaleString(); lab.innerText = '庫存金額'; }
            else if (state.mode === 'revenue') { 
                const disc = state.revenue.costRaw >= 12000 ? 0.5 : 0.55; const totalExp = state.revenue.fuel + state.revenue.rent + state.revenue.elec + state.revenue.truckRent + state.revenue.etc + state.revenue.other;
                const net = (state.revenue.cash + state.revenue.lp) - (state.revenue.costRaw * disc) - totalExp; 
                val.innerText = '$' + Math.round(net).toLocaleString(); lab.innerText = '今日收益'; 
            }
        }

        function saveRev() { 
            if(state.mode !== 'revenue') return; 
            state.revenue = { cash: Number(document.getElementById('rev-cash').value)||0, lp: Number(document.getElementById('rev-lp').value)||0, costRaw: Number(document.getElementById('rev-cost-raw').value)||0, fuel: Number(document.getElementById('exp-fuel').value)||0, rent: Number(document.getElementById('exp-rent').value)||0, elec: Number(document.getElementById('exp-elec').value)||0, truckRent: Number(document.getElementById('exp-truckRent').value)||0, etc: Number(document.getElementById('exp-etc').value)||0, other: Number(document.getElementById('exp-other').value)||0, note: document.getElementById('exp-note') ? document.getElementById('exp-note').value : '' }; 
            updateStat(); persist(); 
        }

        function changeQty(i, d) { state.inventory[i] = Math.max(0, (state.inventory[i] || 0) + d); render(); persist(); }

        function openSessionModal() { document.getElementById('session-modal').classList.remove('hidden'); const now = new Date(); document.getElementById('s-date-m').innerHTML = Array.from({length:12},(_,i)=>i+1).map(m=>`<option value="${m}" ${now.getMonth()+1===m?'selected':''}>${m}月</option>`).join(''); document.getElementById('s-date-d').innerHTML = Array.from({length:31},(_,i)=>i+1).map(d=>`<option value="${d}" ${now.getDate()===d?'selected':''}>${d}日</option>`).join(''); }
        function confirmSession() { const m = document.getElementById('s-date-m').value, d = document.getElementById('s-date-d').value; state.session.dayOfWeek = new Date(new Date().getFullYear(), m-1, d).getDay(); state.session.active = true; state.session.date = `${m}/${d}`; state.session.location = document.getElementById('s-loc').value; document.getElementById('session-modal').classList.add('hidden'); document.getElementById('session-tag').classList.remove('hidden'); switchMode(state.tempMode || 'inventory'); }

        loadData(); switchMode('inventory');
    </script>
</body>
</html>
